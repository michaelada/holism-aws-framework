<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin - AWS Web Application Framework</title>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load Sora font for warm theme -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <script>
      // Set API base URL for components package
      window.__API_BASE_URL__ = '%VITE_API_BASE_URL%';
      // Replace placeholder with actual value if not replaced by build
      if (window.__API_BASE_URL__.startsWith('%')) {
        window.__API_BASE_URL__ = 'http://localhost:3000';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
